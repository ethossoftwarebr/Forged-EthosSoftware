name: CI — Ethos Starter

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-starter-turbo-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-starter-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @ethos/database db:generate

      - name: Lint (starter)
        run: pnpm --filter '@ethos-app/*' lint

      - name: Typecheck (starter)
        run: pnpm --filter '@ethos-app/*' typecheck

      - name: Test (starter)
        run: pnpm --filter '@ethos-app/*' test --if-present

      - name: Build (starter)
        run: pnpm --filter '@ethos-app/*' build
